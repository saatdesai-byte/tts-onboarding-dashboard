<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Shop — Onboarding Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #f8f8f4;
    --border: #e8e8e0;
    --border2: #d8d8d0;
    --ink: #111111;
    --ink2: #555555;
    --ink3: #999999;
    --blue: #1d4ed8;
    --green: #16a34a;
    --amber: #b45309;
    --red: #dc2626;
    --cyan: #0e7490;
    --purple: #7c3aed;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; padding: 24px; font-size: 14px; line-height: 1.5;
  }
  .page { max-width: 1280px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
  }
  .header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .header-title { font-size: 17px; font-weight: 600; }
  .pill { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; border: 1px solid; }
  .pill-red   { background:#fef2f2; color:#dc2626; border-color:#fecaca; }
  .pill-green { background:#f0fdf4; color:#16a34a; border-color:#bbf7d0; }
  .pill-blue  { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
  .pill-amber { background:#fffbeb; color:#b45309; border-color:#fde68a; }
  .as-of { font-size: 12px; color: var(--ink3); }
  .refresh-btn {
    font-size: 12px; font-weight: 500; padding: 6px 14px;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface); cursor: pointer; color: var(--ink); transition: background .15s;
  }
  .refresh-btn:hover { background: var(--surface2); }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 12px; margin-bottom: 16px; }
  @media(max-width:860px) { .metrics { grid-template-columns: repeat(3,1fr); } }
  @media(max-width:560px) { .metrics { grid-template-columns: repeat(2,1fr); } }
  .metric {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
  }
  .metric-label { font-size: 12px; color: var(--ink2); margin-bottom: 4px; }
  .metric-val { font-size: 26px; font-weight: 600; line-height: 1; margin-bottom: 3px; }
  .metric-sub { font-size: 11px; color: var(--ink3); }

  /* Pipeline banner */
  .pipeline-flow {
    display: flex; align-items: center; flex-wrap: wrap; gap: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 13px 18px; margin-bottom: 16px;
  }
  .pipeline-flow-title { font-size: 11px; font-weight: 600; color: var(--ink3); margin-right: 14px; white-space: nowrap; text-transform: uppercase; letter-spacing:.04em; }
  .pipe-chip {
    font-size: 11px; font-weight: 500; padding: 4px 10px;
    border-radius: 4px; white-space: nowrap; border: 1px solid transparent;
    cursor: pointer; transition: opacity .15s;
  }
  .pipe-chip:hover { opacity: .72; }
  .pipe-arrow { color: var(--ink3); font-size: 12px; padding: 0 4px; }

  /* Two-col */
  .two-col { display: grid; grid-template-columns: minmax(0,1.6fr) minmax(0,1fr); gap: 14px; margin-bottom: 14px; }
  @media(max-width:700px) { .two-col { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .card-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--ink); }

  /* Stage bars */
  .stage-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .stage-row:last-of-type { border-bottom: none; }
  .stage-label { font-size: 12px; color: var(--ink2); width: 150px; flex-shrink: 0; cursor: pointer; }
  .stage-label:hover { color: var(--blue); text-decoration: underline; }
  .bar-wrap { flex: 1; height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
  .bar { height: 100%; border-radius: 4px; transition: width .5s ease; }
  .stage-count { font-size: 13px; font-weight: 600; width: 18px; text-align: right; flex-shrink: 0; }

  /* Blocker */
  .blocker-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .blocker-row:last-of-type { border-bottom: none; }
  .b-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .b-name { font-size: 13px; flex: 1; cursor: pointer; }
  .b-name:hover { color: var(--blue); text-decoration: underline; }
  .b-n { font-size: 15px; font-weight: 600; }
  .b-pct { font-size: 11px; color: var(--ink3); width: 34px; text-align: right; }
  .b-divider { height: 1px; background: var(--border); margin: 8px 0; }
  .b-note { font-size: 12px; color: var(--ink2); margin-top: 6px; }

  /* Ops workload mini-cards */
  .ops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px; }
  .ops-card {
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px 14px; cursor: pointer; transition: border-color .15s, background .15s;
  }
  .ops-card:hover { border-color: var(--blue); background: #f5f8ff; }
  .ops-card.active { border-color: var(--blue); background: #eff6ff; }
  .ops-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .ops-stat { font-size: 11px; color: var(--ink2); display: flex; justify-content: space-between; margin-bottom: 2px; }
  .ops-stat span:last-child { font-weight: 600; }
  .ops-blocked { color: var(--red) !important; }

  /* Filter bar */
  .filter-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    margin-bottom: 12px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
  }
  .filter-label { font-size: 11px; font-weight: 600; color: var(--ink3); text-transform: uppercase; letter-spacing:.04em; white-space: nowrap; }
  .filter-select {
    font-size: 12px; padding: 5px 10px; border: 1px solid var(--border2);
    border-radius: 20px; background: var(--surface); color: var(--ink2);
    cursor: pointer; outline: none;
  }
  .filter-select:focus { border-color: var(--blue); }
  .filter-divider { width: 1px; height: 20px; background: var(--border2); margin: 0 2px; }
  .filter-chip {
    display: flex; align-items: center; gap: 4px; font-size: 11px;
    background: #eff6ff; color: var(--blue); border: 1px solid #bfdbfe;
    border-radius: 20px; padding: 3px 8px 3px 10px; font-weight: 500;
  }
  .filter-chip button { background: none; border: none; cursor: pointer; color: #93c5fd; font-size: 14px; line-height: 1; padding: 0 0 0 2px; }
  .filter-chip button:hover { color: var(--blue); }
  .result-count { font-size: 12px; color: var(--ink3); margin-left: auto; }

  /* Sort bar */
  .sort-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .sort-label { font-size: 11px; color: var(--ink3); }
  .sort-btn {
    font-size: 11px; font-weight: 500; padding: 4px 10px;
    border: 1px solid var(--border2); border-radius: 20px;
    background: var(--surface); cursor: pointer; color: var(--ink2); white-space: nowrap;
  }
  .sort-btn.active { background: var(--surface2); color: var(--ink); font-weight: 600; }
  .sort-btn:hover { border-color: var(--blue); color: var(--blue); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    font-size: 11px; font-weight: 600; color: var(--ink3); text-align: left;
    padding: 0 10px 10px 0; border-bottom: 1px solid var(--border2);
    text-transform: uppercase; letter-spacing: .04em; white-space: nowrap;
    cursor: pointer; user-select: none;
  }
  th:hover { color: var(--blue); }
  th.sort-active { color: var(--blue); }
  td { padding: 10px 10px 10px 0; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .brand-name { font-weight: 600; font-size: 13px; }

  .stage-chip {
    display: inline-block; font-size: 11px; padding: 2px 8px;
    border-radius: 20px; background: var(--surface2); color: var(--ink2);
    border: 1px solid var(--border); white-space: nowrap;
  }

  /* Person avatar chip */
  .person-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; padding: 2px 8px 2px 4px;
    border-radius: 20px; border: 1px solid var(--border); white-space: nowrap;
    background: var(--surface2);
  }
  .avatar {
    width: 18px; height: 18px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: white; flex-shrink: 0;
  }
  /* Ops avatars */
  .av-saat    { background: #7c3aed; }
  .av-sanskar { background: #0891b2; }
  /* AM avatars — generated per name */
  .av-am      { background: #1d4ed8; }

  .badge {
    display: inline-block; font-size: 11px; font-weight: 500;
    padding: 2px 9px; border-radius: 20px; border: 1px solid; white-space: nowrap;
  }
  .badge-tiktok  { background:#fffbeb; color:#92400e;  border-color:#fde68a; }
  .badge-brand   { background:#fef2f2; color:#991b1b;  border-color:#fecaca; }
  .badge-pattern { background:#eff6ff; color:#1e40af;  border-color:#bfdbfe; }
  .badge-ok      { background:#f0fdf4; color:#15803d;  border-color:#bbf7d0; }
  .badge-wait    { background:#fffbeb; color:#92400e;  border-color:#fde68a; }
  .badge-none    { background:var(--surface2); color:var(--ink3); border-color:var(--border); }

  .days { font-weight: 600; }
  .days-ok   { color: var(--green); }
  .days-warn { color: var(--amber); }
  .days-crit { color: var(--red); }

  /* Progress dots */
  .progress-steps { display: flex; align-items: center; gap: 3px; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .step-dot.done    { background: #16a34a; }
  .step-dot.current { background: #1d4ed8; box-shadow: 0 0 0 2px #bfdbfe; }
  .step-dot.waiting { background: #b45309; }
  .step-dot.pending { background: #e2e2da; }
  .step-connector   { width: 5px; height: 2px; background: #e2e2da; flex-shrink: 0; }
  .step-connector.done { background: #bbf7d0; }

  /* Task progress */
  .task-prog-wrap { height: 5px; border-radius: 3px; background: #e5e7eb; overflow: hidden; margin-top: 3px; }
  .task-prog-bar  { height: 100%; border-radius: 3px; transition: width .4s; }

  /* Spinner / states */
  .state-box { text-align: center; padding: 60px 20px; color: var(--ink2); font-size: 14px; }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border2);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--radius);
    padding: 14px 18px; color: #991b1b; font-size: 13px; margin-bottom: 16px;
  }
  .empty-state { text-align: center; padding: 32px 20px; color: var(--ink3); font-size: 13px; }

  /* Token setup */
  .token-setup {
    max-width: 540px; margin: 60px auto; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 28px;
  }
  .token-setup h2  { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .token-setup p   { font-size: 13px; color: var(--ink2); margin-bottom: 16px; }
  .token-setup label { font-size: 12px; font-weight: 600; color: var(--ink2); display: block; margin-bottom: 5px; }
  .token-setup input {
    width: 100%; border: 1px solid var(--border2); border-radius: var(--radius-sm);
    padding: 9px 12px; font-size: 13px; font-family: 'SF Mono', Monaco, monospace;
    outline: none; margin-bottom: 12px;
  }
  .token-setup input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px #dbeafe; }
  .token-setup button {
    width: 100%; background: var(--blue); color: white; border: none;
    border-radius: var(--radius-sm); padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .token-setup button:hover { background: #1e40af; }
  .token-note { font-size: 11px; color: var(--ink3); margin-top: 10px; }
  .token-note a { color: var(--blue); }

  .footer { font-size: 11px; color: var(--ink3); margin-top: 16px; text-align: center; }
</style>
</head>
<body>
<div class="page" id="root">
  <div class="state-box"><div class="spinner"></div>Initialising…</div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const PROJECT_ID  = '1213113488679843';
const STORAGE_KEY = 'asana_pat_tts_ob';

const FIELD = {
  onboardingStatus: '1213187098790831',
  brandName:        '1213225017301320',
  accountManager:   '1213225017301318',   // people field
  dateSigned:       '1213225018306908',
  brandType:        '1213186691704359',
  taskProgress:     '1213113488679871',
};

// Ops team — used for avatar colour
const OPS_COLORS = { saat: '#7c3aed', sanskar: '#0891b2' };

const STATUS = {
  '1213187098790832': { label: 'Not Started',      blocker: null,         ok: true  },
  '1213187098790833': { label: 'In Progress',       blocker: null,         ok: true  },
  '1213187098790834': { label: 'Waiting on IT',     blocker: 'Pattern',    ok: false },
  '1213187098790835': { label: 'Waiting on Brand',  blocker: 'Brand / AM', ok: false },
  '1213187098790836': { label: 'Waiting on TikTok', blocker: 'TikTok',     ok: false },
  '1213187098790837': { label: 'Complete',          blocker: null,         ok: true  },
};

const PIPELINE_STEPS = [
  'Signed – Day 0 Setup',
  'Routing & AM Assignment',
  'SHOP BUILD',
  'CATEGORY + LISTINGS',
  'BINDING',
  'FINAL LIVE CHECK',
];

const STAGE_ORDER = [
  'Signed – Day 0 Setup',
  'Routing & AM Assignment',
  'SHOP BUILD',
  'CATEGORY + LISTINGS',
  'BINDING',
  'WAITING/BLOCKED',
  'FINAL LIVE CHECK',
];

const STAGE_SHORT = {
  'Signed – Day 0 Setup':    'Day 0 Setup',
  'Routing & AM Assignment': 'Routing & AM',
  'SHOP BUILD':              'Shop Build',
  'CATEGORY + LISTINGS':     'Cat + Listings',
  'BINDING':                 'Binding',
  'WAITING/BLOCKED':         'Waiting/Blocked',
  'FINAL LIVE CHECK':        'Final Live Check',
};

const STAGE_COLOR = {
  'Signed – Day 0 Setup':    '#378ADD',
  'Routing & AM Assignment': '#378ADD',
  'SHOP BUILD':              '#7c3aed',
  'CATEGORY + LISTINGS':     '#16a34a',
  'BINDING':                 '#0891b2',
  'WAITING/BLOCKED':         '#b45309',
  'FINAL LIVE CHECK':        '#16a34a',
};

const STAGE_CHIP_STYLE = {
  'Signed – Day 0 Setup':    'background:#eff6ff;color:#1e40af;border-color:#bfdbfe',
  'Routing & AM Assignment': 'background:#eff6ff;color:#1e40af;border-color:#bfdbfe',
  'SHOP BUILD':              'background:#f5f3ff;color:#6d28d9;border-color:#ddd6fe',
  'CATEGORY + LISTINGS':     'background:#f0fdf4;color:#15803d;border-color:#bbf7d0',
  'BINDING':                 'background:#ecfeff;color:#0e7490;border-color:#a5f3fc',
  'WAITING/BLOCKED':         'background:#fffbeb;color:#92400e;border-color:#fde68a',
  'FINAL LIVE CHECK':        'background:#f0fdf4;color:#15803d;border-color:#bbf7d0',
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let _allBrands       = [];
let _onboardedBrands = [];
let _filters   = { stage: null, blocker: null, ops: null, am: null };
let _sortBy    = 'days';
let _sortDir   = -1;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const daysSince = d => d ? Math.floor((Date.now() - new Date(d)) / 86400000) : null;

function daysClass(n) {
  if (n === null || n === undefined) return '';
  if (n <= 14) return 'days-ok';
  if (n <= 30) return 'days-warn';
  return 'days-crit';
}

// Avatar initials from full name
function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(' ');
  return parts.length >= 2 ? parts[0][0] + parts[parts.length-1][0] : parts[0].slice(0,2);
}

// Stable colour from name string
function nameColor(name) {
  if (!name) return '#888';
  const key = name.toLowerCase().split(' ')[0];
  if (OPS_COLORS[key]) return OPS_COLORS[key];
  // hash the name to a colour from a warm palette
  const palette = ['#1d4ed8','#0891b2','#7c3aed','#16a34a','#b45309','#be185d','#0f766e'];
  let h = 0; for (let i=0; i<name.length; i++) h = (h*31 + name.charCodeAt(i)) & 0xfffffff;
  return palette[h % palette.length];
}

function personChip(name, title, fullName = false) {
  if (!name) return `<span style="color:#ccc;font-size:12px">—</span>`;
  const color = nameColor(name);
  const ini = initials(name).toUpperCase();
  const display = fullName ? name : name.split(' ')[0];
  return `<span class="person-chip" title="${title || name}">
    <span class="avatar" style="background:${color}">${ini}</span>${display}
  </span>`;
}

function stageStep(s) { return PIPELINE_STEPS.indexOf(s); }

function progressStepsHtml(section) {
  const current = stageStep(section);
  const isWaiting = section === 'WAITING/BLOCKED';
  return PIPELINE_STEPS.map((s, i) => {
    const dotClass = isWaiting ? (i < current ? 'done' : 'pending')
                   : i < current  ? 'done'
                   : i === current ? 'current'
                   : 'pending';
    const connClass = (!isWaiting && i < current) ? 'done' : '';
    const conn = i < PIPELINE_STEPS.length - 1
      ? `<div class="step-connector ${connClass}"></div>` : '';
    return `<div class="step-dot ${dotClass}" title="${STAGE_SHORT[s]||s}"></div>${conn}`;
  }).join('');
}

function taskProgColor(label) {
  if (!label) return '#ccc';
  const l = label.toLowerCase();
  if (l.includes('complete')) return '#16a34a';
  if (l.includes('progress'))  return '#1d4ed8';
  if (l.includes('waiting') || l.includes('blocked')) return '#b45309';
  return '#888';
}

function taskProgPct(label) {
  if (!label) return 0;
  const l = label.toLowerCase();
  if (l.includes('complete')) return 100;
  if (l.includes('progress'))  return 55;
  if (l.includes('waiting'))   return 30;
  return 10;
}

function saveToken(t) { localStorage.setItem(STORAGE_KEY, t); }
function loadToken()  { return localStorage.getItem(STORAGE_KEY) || ''; }
function clearToken() { localStorage.removeItem(STORAGE_KEY); }

// ─── ASANA API ───────────────────────────────────────────────────────────────
async function asana(path, token) {
  const r = await fetch(`https://app.asana.com/api/1.0${path}`, {
    headers: { Authorization: `Bearer ${token}`, Accept: 'application/json' }
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.errors?.[0]?.message || `HTTP ${r.status}`);
  }
  return r.json();
}

async function fetchBrands(token) {
  const fields = [
    'name','completed',
    'custom_fields.gid','custom_fields.name',
    'custom_fields.display_value','custom_fields.enum_value',
    'custom_fields.text_value','custom_fields.date_value',
'memberships.section.name','memberships.section.gid',
    'assignee.name',
  ].join(',');

  const data = await asana(`/tasks?project=${PROJECT_ID}&opt_fields=${fields}&limit=100`, token);

  return data.data
    .map(t => {
      const cf = {};
      let taskProgressLabel = null;
      let accountManager    = null;

      (t.custom_fields || []).forEach(f => {
        cf[f.gid] = f.display_value || f.text_value || f.date_value?.date || null;
        if (f.gid === FIELD.onboardingStatus) cf._statusGid = f.enum_value?.gid || null;
        if (f.gid === FIELD.taskProgress)     taskProgressLabel = f.display_value || null;
        if (f.gid === FIELD.accountManager) {
          // display_value holds the name directly (people_value only returns gid/resource_type)
          accountManager = f.display_value || null;
        }
      });

      const section    = t.memberships?.[0]?.section?.name || 'Unknown';
      const brandName  = cf[FIELD.brandName] || t.name || '';
      const dateSigned = cf[FIELD.dateSigned] || null;
      const statusGid  = cf._statusGid;
      const statusInfo = STATUS[statusGid] || null;
      // assignee = ops person (Saat / Sanskar)
      const ops = t.assignee?.name || null;

      return {
        name: brandName, section, dateSigned,
        statusGid, statusInfo,
        ops, accountManager,
        taskProgressLabel,
        rawName: t.name,
        completed: !!t.completed,
      };
    })
    .filter(b => b.name && b.name.trim());
}

// ─── FILTER + SORT ───────────────────────────────────────────────────────────
function applyFiltersSort(brands) {
  let out = brands.slice();
  if (_filters.stage)   out = out.filter(b => b.section === _filters.stage);
  if (_filters.blocker) {
    if (_filters.blocker === 'None') out = out.filter(b => !b.statusInfo?.blocker);
    else out = out.filter(b => b.statusInfo?.blocker === _filters.blocker);
  }
  if (_filters.ops) out = out.filter(b => b.ops === _filters.ops);
  if (_filters.am)  out = out.filter(b => b.accountManager === _filters.am);

  out.sort((a, b) => {
    let va, vb;
    if (_sortBy === 'days')  { va = daysSince(a.dateSigned) ?? -1; vb = daysSince(b.dateSigned) ?? -1; }
    else if (_sortBy === 'stage') { va = STAGE_ORDER.indexOf(a.section); vb = STAGE_ORDER.indexOf(b.section); }
    else if (_sortBy === 'ops')   { va = a.ops || ''; vb = b.ops || ''; }
    else if (_sortBy === 'am')    { va = a.accountManager || ''; vb = b.accountManager || ''; }
    else if (_sortBy === 'name')  { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
    if (va < vb) return _sortDir;
    if (va > vb) return -_sortDir;
    return 0;
  });
  return out;
}

function setFilter(type, value) {
  _filters[type] = _filters[type] === value ? null : value;
  refreshTable();
}
function clearAllFilters() { _filters = { stage:null, blocker:null, ops:null, am:null }; refreshTable(); }
function setSort(field) {
  if (_sortBy === field) _sortDir *= -1;
  else { _sortBy = field; _sortDir = (field==='name'||field==='ops'||field==='am') ? 1 : -1; }
  refreshTable();
}

// ─── OPS WORKLOAD MINI-CARDS ─────────────────────────────────────────────────
function opsWorkloadHtml(brands) {
  const people = [...new Set(brands.map(b => b.ops).filter(Boolean))].sort();
  if (!people.length) return '<div style="color:#ccc;font-size:12px">No assignees found</div>';

  return `<div class="ops-grid">` + people.map(person => {
    const mine    = brands.filter(b => b.ops === person);
    const blocked = mine.filter(b => b.statusInfo?.blocker || b.section === 'WAITING/BLOCKED');
    const isActive = _filters.ops === person;
    return `<div class="ops-card ${isActive ? 'active' : ''}" onclick="setFilter('ops','${person}')">
      <div class="ops-name" style="display:flex;align-items:center;gap:6px">
        <span class="avatar" style="background:${nameColor(person)}">${initials(person).toUpperCase()}</span>
        ${person.split(' ')[0]}
      </div>
      <div class="ops-stat"><span>Brands</span><span>${mine.length}</span></div>
      ${blocked.length > 0 ? `<div class="ops-stat"><span>Blocked</span><span class="ops-blocked">${blocked.length}</span></div>` : ''}
      <div class="ops-stat"><span>In pipeline</span><span>${mine.filter(b => b.section !== 'FINAL LIVE CHECK').length}</span></div>
    </div>`;
  }).join('') + `</div>`;
}

// ─── AM WORKLOAD MINI-CARDS ──────────────────────────────────────────────────
function amWorkloadHtml(brands) {
  const ams = [...new Set(brands.map(b => b.accountManager).filter(Boolean))].sort();
  if (!ams.length) return '<div style="color:#ccc;font-size:12px">No AMs found</div>';

  return `<div class="ops-grid">` + ams.map(am => {
    const mine    = brands.filter(b => b.accountManager === am);
    const blocked = mine.filter(b => b.statusInfo?.blocker || b.section === 'WAITING/BLOCKED');
    const isActive = _filters.am === am;
    return `<div class="ops-card ${isActive ? 'active' : ''}" onclick="setFilter('am','${am}')">
      <div class="ops-name" style="display:flex;align-items:center;gap:6px">
        <span class="avatar av-am" style="background:${nameColor(am)}">${initials(am).toUpperCase()}</span>
        ${am.split(' ')[0]}
      </div>
      <div class="ops-stat"><span>Brands</span><span>${mine.length}</span></div>
      ${blocked.length > 0 ? `<div class="ops-stat"><span>Blocked</span><span class="ops-blocked">${blocked.length}</span></div>` : ''}
      <div class="ops-stat"><span>Active</span><span>${mine.filter(b => b.section !== 'FINAL LIVE CHECK').length}</span></div>
    </div>`;
  }).join('') + `</div>`;
}

// ─── FULLY ONBOARDED SECTION ─────────────────────────────────────────────────

  const el = document.getElementById('onboarded-section');

  const brands = _onboardedBrands;
  if (!brands.length) { el.innerHTML = ''; return; }

  // Sort by dateSigned descending (most recently signed first)
  const sorted = brands.slice().sort((a, b) => {
    const da = a.dateSigned ? new Date(a.dateSigned) : new Date(0);
    const db = b.dateSigned ? new Date(b.dateSigned) : new Date(0);
    return db - da;
  });

  el.innerHTML = `
    <div class="card" style="margin-top:24px;border-left:4px solid #16a34a">
      <div class="card-title" style="display:flex;align-items:center;gap:8px">
        <span style="font-size:16px">✅</span>
        Fully Onboarded
        <span style="font-size:12px;font-weight:400;color:#aaa">${brands.length} brand${brands.length!==1?'s':''} completed</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:160px">Brand</th>
              <th style="width:95px">Ops</th>
              <th style="width:140px">AM</th>
              <th style="width:90px">Date Signed</th>

              return `<tr>
                <td class="brand-name" style="display:flex;align-items:center;gap:6px">
                  <span style="color:#16a34a;font-size:13px">✓</span> ${b.name}

                <td>${personChip(b.ops, 'Ops owner')}</td>

      </div>

  `;
}

// ─── REFRESH TABLE ───────────────────────────────────────────────────────────
function refreshTable() {
  const filtered = applyFiltersSort(_allBrands);
  const opsList  = [...new Set(_allBrands.map(b => b.ops).filter(Boolean))].sort();
  const amList   = [...new Set(_allBrands.map(b => b.accountManager).filter(Boolean))].sort();

  const chips = [];
  if (_filters.stage)   chips.push({ label: STAGE_SHORT[_filters.stage] || _filters.stage, type:'stage' });
  if (_filters.blocker) chips.push({ label: _filters.blocker === 'None' ? 'No blocker' : _filters.blocker, type:'blocker' });
  if (_filters.ops)     chips.push({ label: `Ops: ${_filters.ops.split(' ')[0]}`, type:'ops' });
  if (_filters.am)      chips.push({ label: `AM: ${_filters.am.split(' ')[0]}`, type:'am' });

  const arrow = d => d === -1 ? ' ↓' : ' ↑';

  const el = document.getElementById('brand-table-section');
  if (!el) return;

  // Re-render workload section too if filters changed
  const wl = document.getElementById('workload-section');
  if (wl) {
    wl.innerHTML = `
      <div class="two-col" style="margin-top:24px">
        <div class="card">
          <div class="card-title">Ops workload <span style="font-size:11px;color:#aaa;font-weight:400">(click to filter)</span></div>
          ${opsWorkloadHtml(_allBrands)}
        </div>
        <div class="card">
          <div class="card-title">AM workload <span style="font-size:11px;color:#aaa;font-weight:400">(click to filter)</span></div>
          ${amWorkloadHtml(_allBrands)}
        </div>
      </div>
    `;
  }

  el.innerHTML = `
    <!-- Filter bar -->
    <div class="filter-bar">
      <span class="filter-label">Filter</span>

      <select class="filter-select" onchange="setFilter('stage', this.value||null); this.value=''">
        <option value="">Stage…</option>
        ${STAGE_ORDER.map(s=>`<option value="${s}" ${_filters.stage===s?'selected':''}>${STAGE_SHORT[s]}</option>`).join('')}
      </select>

      <select class="filter-select" onchange="setFilter('blocker', this.value||null); this.value=''">
        <option value="">Blocker…</option>
        <option value="TikTok"     ${_filters.blocker==='TikTok'?'selected':''}>TikTok</option>
        <option value="Brand / AM" ${_filters.blocker==='Brand / AM'?'selected':''}>Brand / AM</option>
        <option value="Pattern"    ${_filters.blocker==='Pattern'?'selected':''}>Pattern</option>
        <option value="None"       ${_filters.blocker==='None'?'selected':''}>No blocker</option>
      </select>

      <select class="filter-select" onchange="setFilter('ops', this.value||null); this.value=''">
        <option value="">Ops…</option>
        ${opsList.map(o=>`<option value="${o}" ${_filters.ops===o?'selected':''}>${o.split(' ')[0]}</option>`).join('')}
      </select>

      <select class="filter-select" onchange="setFilter('am', this.value||null); this.value=''">
        <option value="">AM…</option>
        ${amList.map(a=>`<option value="${a}" ${_filters.am===a?'selected':''}>${a.split(' ')[0]}</option>`).join('')}
      </select>

      ${chips.length > 0 ? `
        <div class="filter-divider"></div>
        ${chips.map(c=>`
          <div class="filter-chip">${c.label}
            <button onclick="setFilter('${c.type}',null)" title="Remove">×</button>
          </div>`).join('')}
        ${chips.length > 1 ? `<button style="font-size:11px;padding:3px 8px;border:1px solid var(--border2);border-radius:20px;background:none;cursor:pointer;color:var(--ink2)" onclick="clearAllFilters()">Clear all</button>` : ''}
      ` : ''}
      <span class="result-count">${filtered.length} of ${_allBrands.length} brands</span>
    </div>

    <!-- Sort bar -->
    <div class="sort-bar">
      <span class="sort-label">Sort by:</span>
      <button class="sort-btn ${_sortBy==='days'?'active':''}"  onclick="setSort('days')">Days in pipeline${_sortBy==='days'?arrow(_sortDir):''}</button>
      <button class="sort-btn ${_sortBy==='stage'?'active':''}" onclick="setSort('stage')">Stage${_sortBy==='stage'?arrow(_sortDir):''}</button>
      <button class="sort-btn ${_sortBy==='ops'?'active':''}"   onclick="setSort('ops')">Ops${_sortBy==='ops'?arrow(_sortDir):''}</button>
      <button class="sort-btn ${_sortBy==='am'?'active':''}"    onclick="setSort('am')">AM${_sortBy==='am'?arrow(_sortDir):''}</button>
      <button class="sort-btn ${_sortBy==='name'?'active':''}"  onclick="setSort('name')">Name${_sortBy==='name'?arrow(_sortDir):''}</button>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="card-title">Brand-level view</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:148px" onclick="setSort('name')">Brand${_sortBy==='name'?arrow(_sortDir):''}</th>
              <th style="width:118px">Stage</th>
              <th style="width:148px">Progress</th>
              <th style="width:95px"  onclick="setSort('ops')">Ops${_sortBy==='ops'?arrow(_sortDir):''}  <span style="font-weight:400;color:#bbb">(assignee)</span></th>
              <th style="width:140px" onclick="setSort('am')">AM${_sortBy==='am'?arrow(_sortDir):''}</th>
              <th style="width:95px">Task status</th>
              <th style="width:105px">Blocker</th>
              <th style="width:64px"  onclick="setSort('days')">Days in${_sortBy==='days'?arrow(_sortDir):''}</th>

          </thead>

              <tr><td colspan="8">

              const days = daysSince(b.dateSigned);

              const chipStyle = STAGE_CHIP_STYLE[b.section] ? `style="${STAGE_CHIP_STYLE[b.section]}"` : '';
              const progColor = taskProgColor(b.taskProgressLabel);

              let blockerBadge;
              if (blocker === 'TikTok')          blockerBadge = `<span class="badge badge-tiktok">TikTok</span>`;
              else if (blocker === 'Brand / AM')  blockerBadge = `<span class="badge badge-brand">Brand / AM</span>`;
              else if (blocker === 'Pattern')     blockerBadge = `<span class="badge badge-pattern">Pattern</span>`;

              else if (b.section === 'WAITING/BLOCKED') blockerBadge = `<span class="badge badge-wait">Waiting</span>`;
              else if (isOk)                      blockerBadge = `<span class="badge badge-ok">On track</span>`;

              return `<tr>

                <td>${personChip(b.accountManager, 'Account Manager', true)}</td>

        </table>
      </div>
      <div style="font-size:11px;color:#aaa;margin-top:12px;padding-top:10px;border-top:1px solid #eee">
        Ops = task assignee (Saat / Sanskar) · AM = Account Manager custom field · Source: Asana Onboarding 2026
      </div>
    </div>
  `;
  renderOnboardedSection();
}

// ─── FULL DASHBOARD RENDER ───────────────────────────────────────────────────
function renderDashboard(brands) {
  _allBrands         = brands.filter(b => !b.completed);
  _onboardedBrands   = brands.filter(b => b.completed);
  const now = new Date();

  const stageCounts = {};
  STAGE_ORDER.forEach(s => stageCounts[s] = 0);
  brands.forEach(b => { if (b.section in stageCounts) stageCounts[b.section]++; });

  const bc = { 'TikTok': 0, 'Brand / AM': 0, 'Pattern': 0, 'None': 0 };
  brands.forEach(b => {
    const bl = b.statusInfo?.blocker || null;
    if (bl) bc[bl]++; else bc['None']++;
  });

  const total       = brands.length;
  const totalBlocked= bc.TikTok + bc['Brand / AM'] + bc.Pattern;
  const onTrack     = total - totalBlocked;
  const inBinding   = stageCounts['BINDING'] || 0;
  const waitBlocked = stageCounts['WAITING/BLOCKED'] || 0;

  const daysArr = brands.filter(b => b.dateSigned).map(b => daysSince(b.dateSigned));
  const avgDays = daysArr.length ? Math.round(daysArr.reduce((a,v)=>a+v,0)/daysArr.length) : null;
  const maxDays = daysArr.length ? Math.max(...daysArr) : null;
  const maxCount = Math.max(...STAGE_ORDER.map(s => stageCounts[s]||0), 1);

  const mostUrgent = brands
    .filter(b => b.statusInfo?.blocker && b.dateSigned)
    .sort((a,b) => daysSince(b.dateSigned) - daysSince(a.dateSigned))[0];

  document.getElementById('root').innerHTML = `
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="header-title">TikTok Shop — onboarding tracker</div>
        ${totalBlocked > 0 ? `<span class="pill pill-red">${totalBlocked} blocked</span>` : ''}
        <span class="pill pill-green">${onTrack} on track</span>
        ${inBinding > 0 ? `<span class="pill pill-blue">${inBinding} in binding</span>` : ''}
        <span class="pill pill-blue">live · Asana</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="as-of">Updated ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
        <button class="refresh-btn" onclick="init()">↻ Refresh</button>
        <button class="refresh-btn" style="color:#dc2626" onclick="handleSignOut()">Sign out</button>
      </div>
    </div>

    <!-- Pipeline flow -->
    <div class="pipeline-flow">
      <span class="pipeline-flow-title">Pipeline</span>
      ${PIPELINE_STEPS.map((s,i) => `
        <span class="pipe-chip" style="${STAGE_CHIP_STYLE[s]||''}"
          onclick="setFilter('stage','${s}')" title="Filter to ${STAGE_SHORT[s]}">
          ${STAGE_SHORT[s]}${stageCounts[s] ? ` <strong>${stageCounts[s]}</strong>` : ''}
        </span>
        ${i < PIPELINE_STEPS.length-1 ? '<span class="pipe-arrow">→</span>' : ''}
      `).join('')}
      ${waitBlocked > 0 ? `
        <span style="margin-left:14px;cursor:pointer" onclick="setFilter('stage','WAITING/BLOCKED')">
          <span style="font-size:11px;font-weight:500;background:#fffbeb;color:#92400e;border:1px solid #fde68a;padding:4px 10px;border-radius:4px;">
            ⚠ ${waitBlocked} waiting/blocked
          </span>
        </span>
      ` : ''}
    </div>

    <!-- Metrics -->
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Total brands</div>
        <div class="metric-val">${total}</div>
        <div class="metric-sub">active pipeline</div>
      </div>
      <div class="metric">
        <div class="metric-label">Avg days since signed</div>
        <div class="metric-val" style="color:${avgDays>30?'#b45309':'#16a34a'}">${avgDays!==null?avgDays+'d':'—'}</div>
        <div class="metric-sub">longest: ${maxDays!==null?maxDays+'d':'—'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">In binding</div>
        <div class="metric-val" style="color:${inBinding>0?'#0e7490':'#111'}">${inBinding}</div>
        <div class="metric-sub">awaiting contract</div>
      </div>
      <div class="metric">
        <div class="metric-label">Blocked by TikTok</div>
        <div class="metric-val" style="color:${bc.TikTok>0?'#dc2626':'#111'}">${bc.TikTok}</div>
        <div class="metric-sub">approval delays</div>
      </div>
      <div class="metric">
        <div class="metric-label">Blocked by Brand/AM</div>
        <div class="metric-val" style="color:${bc['Brand / AM']>0?'#dc2626':'#111'}">${bc['Brand / AM']}</div>
        <div class="metric-sub">missing info / handle</div>
      </div>
    </div>

    <!-- Stage + Blocker charts -->
    <div class="two-col">
      <div class="card">
        <div class="card-title">Pipeline by stage <span style="font-size:11px;color:#aaa;font-weight:400">(click to filter)</span></div>
        ${STAGE_ORDER.map(s => {
          const count = stageCounts[s]||0;
          const pct = Math.round((count/maxCount)*100);
          return `<div class="stage-row">
            <div class="stage-label" onclick="setFilter('stage','${s}')">${STAGE_SHORT[s]||s}</div>
            <div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${STAGE_COLOR[s]||'#888'}"></div></div>
            <div class="stage-count" style="color:${count===0?'#ccc':'#111'}">${count}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="card">
        <div class="card-title">Blocker attribution <span style="font-size:11px;color:#aaa;font-weight:400">(click to filter)</span></div>
        ${[['TikTok','#b45309'],['Brand / AM','#dc2626'],['Pattern','#1d4ed8'],['None','#16a34a']].map(([name,color]) => {
          const count = bc[name];
          const pct = total > 0 ? Math.round((count/total)*100) : 0;
          return `<div class="blocker-row">
            <div class="b-dot" style="background:${color}"></div>
            <div class="b-name" onclick="setFilter('blocker','${name==='None'?'None':name}')">${name==='None'?'No blocker':name}</div>
            <div class="b-n">${count}</div>
            <div class="b-pct">${pct}%</div>
          </div>`;
        }).join('')}
        ${mostUrgent ? `
          <div class="b-divider"></div>
          <div class="b-note">Most urgent: <strong>${mostUrgent.name}</strong>
          — <span style="color:#dc2626">${daysSince(mostUrgent.dateSigned)}d</span> since signed</div>
        ` : ''}
      </div>
    </div>

    <!-- Brand table (filter/sort managed by refreshTable) -->
    <div id="brand-table-section"></div>

    <!-- Ops + AM workload (below brand table) -->
    <div id="workload-section"></div>

    <!-- Fully onboarded brands -->
    <div id="onboarded-section"></div>

    <div class="footer">TikTok Shop Onboarding Tracker · Pattern Operations · Refreshes on load</div>
  `;

  refreshTable();
}

// ─── TOKEN / LOADING / ERROR ─────────────────────────────────────────────────
function renderSetup(errorMsg) {
  document.getElementById('root').innerHTML = `
    <div class="token-setup">
      <h2>Connect to Asana</h2>
      <p>This dashboard reads live data from your Asana Onboarding 2026 project. Enter your Personal Access Token — stored in your browser only.</p>
      ${errorMsg ? `<div class="error-box">${errorMsg}</div>` : ''}
      <label>Personal Access Token</label>
      <input type="password" id="tokenInput" placeholder="1/1234567890:abcdef…" />
      <button onclick="handleConnect()">Connect →</button>
      <p class="token-note">
        Get your token at <a href="https://app.asana.com/0/developer-console" target="_blank">app.asana.com/0/developer-console</a>
        → Personal access tokens → Create new token.
      </p>
    </div>
  `;
  const inp = document.getElementById('tokenInput');
  inp?.focus();
  inp?.addEventListener('keydown', e => { if (e.key==='Enter') handleConnect(); });
}

function renderLoading() {
  document.getElementById('root').innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="header-title">TikTok Shop — onboarding tracker</div>
        <span class="pill pill-blue">loading…</span>
      </div>
    </div>
    <div class="state-box"><div class="spinner"></div>Fetching from Asana…</div>
  `;
}

async function handleConnect() {
  const t = document.getElementById('tokenInput')?.value?.trim();
  if (!t) return;
  saveToken(t); await init();
}
function handleSignOut() { clearToken(); renderSetup(); }

async function init() {
  const token = loadToken();
  if (!token) { renderSetup(); return; }
  renderLoading();
  try {
    const brands = await fetchBrands(token);
    renderDashboard(brands);
  } catch (err) {
    if (err.message.includes('401') || err.message.toLowerCase().includes('unauthorized')) {
      clearToken(); renderSetup('Invalid token — please check and try again.');
    } else {
      document.getElementById('root').innerHTML = `
        <div class="header">
          <div class="header-left"><div class="header-title">TikTok Shop — onboarding tracker</div></div>
          <button class="refresh-btn" onclick="init()">↻ Retry</button>
        </div>
        <div class="error-box">Could not load Asana data: ${err.message}</div>
        <div style="text-align:center;padding:20px;color:#777;font-size:13px">Check your connection and try again.</div>
      `;
    }
  }
}
